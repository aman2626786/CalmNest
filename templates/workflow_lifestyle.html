{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-50 via-blue-50 to-indigo-100 py-12 px-4">
    <div class="max-w-4xl mx-auto">
        <!-- Progress Indicator -->
        {% include 'components/workflow_progress.html' %}
        
        <!-- Lifestyle Questionnaire Card -->
        <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-r from-purple-500 to-blue-600 rounded-full mb-4">
                    <i data-lucide="heart" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Lifestyle Questionnaire</h1>
                <p class="text-gray-600">Apni daily life ke baare mein batayein taaki hum aapki behtar madad kar sakein</p>
            </div>
            
            <form id="lifestyle-form" class="space-y-6">
                <!-- Question 1: Hobbies -->
                <div class="form-group">
                    <label for="hobbies" class="block text-sm font-semibold text-gray-700 mb-2">
                        1. Hobbies kya hai? <span class="text-red-500">*</span>
                    </label>
                    <textarea 
                        id="hobbies" 
                        name="hobbies" 
                        rows="3" 
                        required
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all"
                        placeholder="Jaise: Reading, painting, music sunna, sports..."></textarea>
                </div>
                
                <!-- Question 2: Eating Habits -->
                <div class="form-group">
                    <label for="eating_habits" class="block text-sm font-semibold text-gray-700 mb-2">
                        2. Recently kya aur kesa kha rahe ho? <span class="text-red-500">*</span>
                    </label>
                    <textarea 
                        id="eating_habits" 
                        name="eating_habits" 
                        rows="3" 
                        required
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all"
                        placeholder="Jaise: Regular meals, fast food, home cooked, appetite kaisi hai..."></textarea>
                </div>
                
                <!-- Question 3: Daily Life -->
                <div class="form-group">
                    <label for="daily_life" class="block text-sm font-semibold text-gray-700 mb-2">
                        3. Daily life kesi hai? <span class="text-red-500">*</span>
                    </label>
                    <textarea 
                        id="daily_life" 
                        name="daily_life" 
                        rows="3" 
                        required
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all"
                        placeholder="Jaise: Busy, stressful, relaxed, routine, work-life balance..."></textarea>
                </div>
                
                <!-- Question 4: Sleep Schedule -->
                <div class="form-group">
                    <label for="sleep_schedule" class="block text-sm font-semibold text-gray-700 mb-2">
                        4. Sleeping time kitna follow kar rahe ho? <span class="text-red-500">*</span>
                    </label>
                    <textarea 
                        id="sleep_schedule" 
                        name="sleep_schedule" 
                        rows="3" 
                        required
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all"
                        placeholder="Jaise: 7-8 hours, irregular, 5-6 hours, neend achhi aati hai ya nahi..."></textarea>
                </div>
                
                <!-- Question 5: Meditation -->
                <div class="form-group">
                    <label for="meditation" class="block text-sm font-semibold text-gray-700 mb-2">
                        5. Meditation kar rahe ho ya nahi? <span class="text-red-500">*</span>
                    </label>
                    <textarea 
                        id="meditation" 
                        name="meditation" 
                        rows="3" 
                        required
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all"
                        placeholder="Jaise: Yes daily, sometimes, no, kitni der..."></textarea>
                </div>
                
                <!-- Question 6: Exercise -->
                <div class="form-group">
                    <label for="exercise" class="block text-sm font-semibold text-gray-700 mb-2">
                        6. Exercise kar rahe ho? <span class="text-red-500">*</span>
                    </label>
                    <textarea 
                        id="exercise" 
                        name="exercise" 
                        rows="3" 
                        required
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all"
                        placeholder="Jaise: Daily walk, gym, yoga, rarely, no..."></textarea>
                </div>
                
                <!-- Question 7: Feel Good Activities -->
                <div class="form-group">
                    <label for="feel_good_activities" class="block text-sm font-semibold text-gray-700 mb-2">
                        7. Kya karke good feel karte ho? <span class="text-red-500">*</span>
                    </label>
                    <textarea 
                        id="feel_good_activities" 
                        name="feel_good_activities" 
                        rows="3" 
                        required
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all"
                        placeholder="Jaise: Music sunna, friends ke saath time, nature walk, cooking..."></textarea>
                </div>
                
                <!-- Question 8: Happiness Triggers -->
                <div class="form-group">
                    <label for="happiness_triggers" class="block text-sm font-semibold text-gray-700 mb-2">
                        8. Konsi cheezein happy feel karwati hain? <span class="text-red-500">*</span>
                    </label>
                    <textarea 
                        id="happiness_triggers" 
                        name="happiness_triggers" 
                        rows="3" 
                        required
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all"
                        placeholder="Jaise: Family time, achievements, helping others, pets..."></textarea>
                </div>
                
                <!-- Submit Button -->
                <div class="flex justify-center pt-6">
                    <button 
                        type="submit" 
                        id="submit-btn"
                        class="px-8 py-4 bg-gradient-to-r from-purple-600 to-blue-600 text-white font-semibold rounded-xl hover:shadow-lg transform hover:scale-105 transition-all duration-200 flex items-center space-x-2">
                        <span>Complete Assessment</span>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('lifestyle-form');
    const submitBtn = document.getElementById('submit-btn');
    
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Disable submit button
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span>Submitting...</span>';
        
        // Collect form data
        const formData = {
            hobbies: document.getElementById('hobbies').value.trim(),
            eating_habits: document.getElementById('eating_habits').value.trim(),
            daily_life: document.getElementById('daily_life').value.trim(),
            sleep_schedule: document.getElementById('sleep_schedule').value.trim(),
            meditation: document.getElementById('meditation').value.trim(),
            exercise: document.getElementById('exercise').value.trim(),
            feel_good_activities: document.getElementById('feel_good_activities').value.trim(),
            happiness_triggers: document.getElementById('happiness_triggers').value.trim()
        };
        
        try {
            const response = await fetch('/complete-analysis/lifestyle/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });
            
            const result = await response.json();
            
            if (result.success) {
                // Redirect to report
                window.location.href = result.redirect;
            } else {
                alert('Error: ' + (result.error || 'Failed to submit'));
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Complete Assessment</span><i data-lucide="arrow-right" class="w-5 h-5"></i>';
                lucide.createIcons();
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Failed to submit. Please try again.');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>Complete Assessment</span><i data-lucide="arrow-right" class="w-5 h-5"></i>';
            lucide.createIcons();
        }
    });
});
</script>
{% endblock %}
