<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CalmNest</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js for emotion graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Screen Time Tracker -->
    <script src="{{ url_for('static', filename='js/screen_time_tracker.js') }}?v={{ range(1, 10000) | random }}"></script>
    <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .primary-button {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .primary-button:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .nav-item {
            position: relative;
            transition: all 0.2s ease;
        }
        .nav-item:hover {
            color: #3b82f6;
        }
        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #3b82f6;
            transition: width 0.3s ease;
        }
        .nav-item:hover::after {
            width: 100%;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Simple Navigation -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="CalmNest Logo" class="w-10 h-10 object-contain">
                    <h1 class="text-xl font-semibold text-gray-900">CalmNest</h1>
                </div>
                <nav class="hidden md:flex space-x-8">
                    <a href="{{ url_for('home') }}" class="nav-item text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium">Home</a>
                    <a href="{{ url_for('dashboard_page') }}" class="nav-item text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium">Dashboard</a>
                    <a href="{{ url_for('emotion_page') }}" class="nav-item text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium">Mood Detection</a>
                    <a href="{{ url_for('phq9_page') }}" class="nav-item text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium">PHQ-9</a>
                    <a href="{{ url_for('gad7_page') }}" class="nav-item text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium">GAD-7</a>
                    <a href="{{ url_for('breathe_page') }}" class="nav-item text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium">Breathe</a>
                    <a href="{{ url_for('chatbot_page') }}" class="nav-item text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium">Chat Bot</a>
                </nav>
                <!-- Mobile menu button -->
                <button class="md:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100" onclick="toggleMobileMenu()">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-white border-t border-gray-200">
                <a href="{{ url_for('home') }}" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">Home</a>
                <a href="{{ url_for('dashboard_page') }}" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">Dashboard</a>
                <a href="{{ url_for('emotion_page') }}" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">Mood Detection</a>
                <a href="{{ url_for('phq9_page') }}" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">PHQ-9</a>
                <a href="{{ url_for('gad7_page') }}" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">GAD-7</a>
                <a href="{{ url_for('breathe_page') }}" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">Breathe</a>
                <a href="{{ url_for('chatbot_page') }}" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">Chat Bot</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Simple Footer -->
    <footer class="bg-white border-t border-gray-200">
        <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-center space-x-2 text-gray-500 text-sm">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="CalmNest" class="w-5 h-5 object-contain">
                <span>Made with care for your wellbeing</span>
            </div>
        </div>
    </footer>

    <!-- Floating Chatbot Widget -->
    {% if request.endpoint != 'chatbot_page' %}
    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        <!-- Chat Window -->
        <div id="chatbot-window" class="hidden mb-4 w-80 sm:w-96 bg-white rounded-2xl shadow-2xl border border-gray-200 overflow-hidden flex flex-col transition-all duration-200 origin-bottom-right">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-600 to-blue-700 p-4 flex justify-between items-center">
                <div class="flex items-center space-x-2 text-white">
                    <div class="bg-white/20 p-1.5 rounded-full">
                        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="CalmNest" class="w-5 h-5 object-contain">
                    </div>
                    <div>
                        <h3 class="font-semibold text-sm">CalmNest Assistant</h3>
                        <p class="text-[10px] text-blue-100 opacity-90">Here to listen</p>
                    </div>
                </div>
                <button id="chatbot-close" class="text-white/80 hover:text-white hover:bg-white/10 rounded-full p-1 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- Messages Area -->
            <div id="chatbot-messages" class="h-96 overflow-y-auto p-4 space-y-4 bg-gray-50 flex flex-col">
                <!-- Messages injected by JS -->
            </div>

            <!-- Input Area -->
            <div class="p-3 bg-white border-t border-gray-100">
                <div id="chatbot-typing" class="hidden text-xs text-gray-400 mb-2 px-2 flex items-center">
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce mr-1"></span>
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce mr-1 delay-75"></span>
                    <span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce delay-150"></span>
                </div>
                <form id="chatbot-form" class="flex items-center gap-2">
                    <input id="chatbot-input" type="text" placeholder="Type a message..." class="flex-1 text-sm bg-gray-50 border-0 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-100 focus:bg-white transition-all outline-none" autocomplete="off">
                    <button type="submit" class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition-colors shadow-sm flex-shrink-0">
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- Toggle Button -->
        <button id="chatbot-toggle" class="group flex items-center justify-center w-14 h-14 bg-gradient-to-br from-teal-500 to-blue-600 text-white rounded-full shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-teal-200 p-2">
            <img src="{{ url_for('static', filename='images/dove-logo.png') }}" alt="Chat" class="w-full h-full object-contain group-hover:scale-110 transition-transform">
        </button>
    </div>
    {% endif %}

    <script>
        lucide.createIcons();
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
    </script>
</body>
</html>
