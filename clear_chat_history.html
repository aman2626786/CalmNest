<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Chat History - CalmNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">🗑️ Clear Chat History</h1>
        <p class="text-gray-600 mb-6">This will clear all chat history from your browser and server.</p>
        
        <button 
            onclick="clearAllHistory()" 
            class="w-full bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition-colors font-semibold"
        >
            Clear All History
        </button>
        
        <div id="status" class="mt-4 p-4 rounded-lg hidden"></div>
        
        <a href="/chatbot" class="block text-center mt-4 text-blue-600 hover:underline">
            ← Back to Chatbot
        </a>
    </div>

    <script>
        async function clearAllHistory() {
            const statusDiv = document.getElementById('status');
            
            try {
                // Clear localStorage
                localStorage.removeItem('chatbotHistory');
                
                // Clear server-side history
                const response = await fetch('/clear-history', { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'success') {
                    statusDiv.className = 'mt-4 p-4 rounded-lg bg-green-100 border border-green-400 text-green-700';
                    statusDiv.innerHTML = '✅ Chat history cleared successfully!<br><small>You can now go back to the chatbot.</small>';
                    statusDiv.classList.remove('hidden');
                } else {
                    throw new Error('Failed to clear server history');
                }
            } catch (err) {
                statusDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 border border-red-400 text-red-700';
                statusDiv.innerHTML = '❌ Error: ' + err.message;
                statusDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
